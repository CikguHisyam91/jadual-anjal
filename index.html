// ── TARIKH ──
function setTarikh() {
  const now = new Date();
  const hari = ['Ahad','Isnin','Selasa','Rabu','Khamis','Jumaat','Sabtu'][now.getDay()];
  const bulan = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogs','Sep','Okt','Nov','Dis'][now.getMonth()];
  document.getElementById('hari-txt').textContent = hari;
  document.getElementById('tarikh-txt').textContent = `${now.getDate()} ${bulan} ${now.getFullYear()}`;
}

function getTarikhFormatted() {
  const now = new Date();
  const d = String(now.getDate()).padStart(2,'0');
  const m = String(now.getMonth()+1).padStart(2,'0');
  return `${d}/${m}/${now.getFullYear()}`;
}

function getMasaJana() {
  const now = new Date();
  return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

    const isAbsent = absentSet.has(i);
    const kad = document.createElement('div');
    kad.className = 'guru-kad ' + (isAbsent ? 'absent' : 'hadir');
    kad.onclick = () => toggleGuru(i);
    kad.innerHTML = `
      <div class="guru-status-dot"></div>
      <div class="guru-nama">${g.nama}</div>
      <div class="guru-jawatan">${g.jawatan}</div>
      ${g.slipDisc ? '<div class="guru-slipdisc">⚠️ Slip Disc</div>' : ''}
    `;
    grid.appendChild(kad);
  });
  kemaskiniStats();
}

// ── TOGGLE GURU ──
function toggleGuru(i) {
  if (absentSet.has(i)) absentSet.delete(i);
  else absentSet.add(i);
  binaGrid();
}

// ── RESET ──
function resetSemua() {
  if (absentSet.size === 0) return;
  if (confirm('Reset semua pilihan?')) {
    absentSet.clear();
    binaGrid();
  }
}

// ── KEMASKINI STATS ──
function kemaskiniStats() {
  const jumlahAbsent = absentSet.size;
  const jumlahHadir = GURU.length - jumlahAbsent;
  const jumlahRelief = GURU.filter((g,i) => !absentSet.has(i) && g.jawatan === 'Guru').length;
  const modKritikal = jumlahAbsent > 10;

  document.getElementById('stat-hadir').textContent = jumlahHadir;
  document.getElementById('stat-absent').textContent = jumlahAbsent;
  document.getElementById('stat-relief').textContent = jumlahRelief;

  const banner = document.getElementById('mod-banner');
  banner.className = 'mod-banner ' + (modKritikal ? 'mod-kritikal' : 'mod-normal');
  document.getElementById('mod-banner').querySelector('.mod-icon').textContent = modKritikal ? '🚨' : '✅';
  document.getElementById('mod-title').textContent = modKritikal ? 'MOD KRITIKAL — GABUNG DEWAN DIAKTIFKAN' : 'MOD NORMAL — RELIEF BIASA';
  document.getElementById('mod-sub').textContent = modKritikal ? 'Lebih 10 guru tiada — Tahap 2 berkumpul di Dewan' : 'Semua guru mencukupi untuk agihan relief';
  document.getElementById('mod-badge').textContent = modKritikal ? 'KRITIKAL' : 'NORMAL';
}

// ── JANA INFOGRAFIK ──
function janaInfografik() {
  const guruAbsent = Array.from(absentSet).map(i => GURU[i]);
  const guruHadir = GURU.filter((_,i) => !absentSet.has(i));
  const reliefPool = guruHadir.filter(g => g.jawatan === 'Guru');
  const modKritikal = absentSet.size > 10;
  const tarikh = getTarikhFormatted();
  const masa = getMasaJana();

  // Agihan
  const agihan = [];
  let reliefIdx = 0;
  guruAbsent.forEach(g => {
    if (modKritikal) {
      agihan.push({ absent: g.nama, tindakan: 'DEWAN', relief: '—', nota: 'Tahap 2 → Dewan. Tahap 1 → Arahan GPK.' });
    } else {
      if (reliefIdx < reliefPool.length) {
        const r = reliefPool[reliefIdx++];
        agihan.push({
          absent: g.nama,
          tindakan: 'RELIEF',
          relief: r.nama + (r.slipDisc ? ' ⚠️' : ''),
          nota: r.slipDisc ? 'Aras Bawah sahaja (Slip Disc)' : 'Boleh ke mana-mana kelas'
        });
      } else {
        agihan.push({ absent: g.nama, tindakan: 'SERAP', relief: '—', nota: 'Murid serap ke kelas jiran' });
      }
    }
  });

  // Bina HTML infografik
  const barisDewan = agihan.filter(a=>a.tindakan==='DEWAN').length;
  const barisRelief = agihan.filter(a=>a.tindakan==='RELIEF').length;
  const barisSerap = agihan.filter(a=>a.tindakan==='SERAP').length;

  let rowsAgihan = agihan.length === 0
    ? `<tr><td colspan="4" style="text-align:center;padding:16px;color:#9E9E9E;font-style:italic">✅ Tiada guru tidak hadir hari ini</td></tr>`
    : agihan.map((a,i) => {
        const bg = i%2===0?'#F8FAFC':'#fff';
        const badgeClass = a.tindakan==='DEWAN'?'badge-dewan':a.tindakan==='RELIEF'?'badge-relief':'badge-serap';
        const badgeLabel = a.tindakan==='DEWAN'?'🏛️ GABUNG DEWAN':a.tindakan==='RELIEF'?'📚 RELIEF':'🔄 SERAP';
        return `<tr style="background:${bg}">
          <td style="padding:7px 10px;border-bottom:1px solid #ECEFF1;font-size:11px;font-weight:700;color:#E53935">${a.absent}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #ECEFF1"><span class="badge ${badgeClass}">${badgeLabel}</span></td>
          <td style="padding:7px 10px;border-bottom:1px solid #ECEFF1;font-size:11px;font-weight:600;color:#1565C0">${a.relief}</td>
          <td style="padding:7px 10px;border-bottom:1px solid #ECEFF1;font-size:10px;color:#607D8B">${a.nota}</td>
        </tr>`;
      }).join('');

  let rowsWaktu = WAKTU.map(w => {
    const isRehat = w.rehat;
    return `<tr class="${isRehat?'waktu-rehat':''}">
      <td style="font-weight:${isRehat?'700':'500'};color:${isRehat?'#E65100':'#37474F'}">${isRehat?'☕ REHAT':'Waktu '+w.bil}</td>
      <td style="color:#607D8B">${w.mula}–${w.tamat}</td>
    </tr>`;
  }).join('');

  let rowsHadir = guruHadir.map((g,i) =>
    `<tr style="background:${i%2===0?'#F8FAFC':'#fff'}">
      <td style="padding:4px 8px;font-size:11px;font-weight:600;color:#212121;border-bottom:1px solid #ECEFF1">${g.nama}</td>
      <td style="padding:4px 8px;font-size:10px;border-bottom:1px solid #ECEFF1;color:${g.slipDisc?'#E65100':'#43A047'}">${g.slipDisc?'⚠️ Slip Disc':'✅'}</td>
    </tr>`
  ).join('');

  const html = `
    <div class="info-header">
      <div class="info-sekolah">SK KING EDWARD VII (1) · TAIPING, PERAK</div>
      <div class="info-title">📋 JADUAL ANJAL HARIAN</div>
      <div class="info-meta">Tarikh: ${tarikh} &nbsp;|&nbsp; Jana pada: ${masa} &nbsp;|&nbsp; Guru tidak hadir: ${absentSet.size} orang</div>
    </div>
    <div class="info-stats">
      <div class="info-stat"><div class="info-stat-num" style="color:#43A047">${guruHadir.length}</div><div class="info-stat-lbl">Hadir</div></div>
      <div class="info-stat"><div class="info-stat-num" style="color:#E53935">${absentSet.size}</div><div class="info-stat-lbl">Tidak Hadir</div></div>
      <div class="info-stat"><div class="info-stat-num" style="color:#1E88E5">${reliefPool.length}</div><div class="info-stat-lbl">Relief Tersedia</div></div>
      <div class="info-stat"><div class="info-stat-num" style="color:#FDD835">${barisDewan}</div><div class="info-stat-lbl">Kelas Dewan</div></div>
      <div class="info-stat"><div class="info-stat-num" style="color:#43A047">${barisRelief}</div><div class="info-stat-lbl">Relief</div></div>
      <div class="info-stat"><div class="info-stat-num" style="color:#FB8C00">${barisSerap}</div><div class="info-stat-lbl">Serap</div></div>
    </div>
    <div class="info-mod ${modKritikal?'info-mod-kritikal':'info-mod-normal'}">
      <span style="font-size:20px">${modKritikal?'🚨':'✅'}</span>
      <div>
        <div>${modKritikal?'MOD KRITIKAL — GABUNG DEWAN DIAKTIFKAN':'MOD NORMAL — AGIHAN RELIEF BIASA'}</div>
        <div style="font-size:11px;font-weight:400;opacity:0.9;margin-top:2px">${modKritikal?'Lebih 10 guru tiada · Tahap 2 berkumpul di Dewan Sekolah':'Agihan guru relief ke kelas yang tiada guru'}</div>
      </div>
    </div>
    <div class="info-body">
      <div class="info-alert">⚠️ <strong>Cikgu Sarina Binti Hashim & Cikgu Tan Fong Lin</strong> — Slip Disc. Tugaskan ke <strong>Aras Bawah SAHAJA</strong>.</div>
      <div class="info-section-title">📌 Agihan Guru Tidak Hadir & Tindakan</div>
      <table class="agihan-table">
        <thead><tr><th>Guru Tidak Hadir</th><th>Tindakan</th><th>Guru Relief</th><th>Nota</th></tr></thead>
        <tbody>${rowsAgihan}</tbody>
      </table>
      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">
        <span class="badge badge-dewan">🏛️ GABUNG DEWAN</span>
        <span class="badge badge-relief">📚 RELIEF</span>
        <span class="badge badge-serap">🔄 SERAP</span>
        <span style="font-size:10px;color:#90A4AE;margin-left:auto">Legend</span>
      </div>

      <div class="waktu-grid" style="margin-top:16px">
        <div class="waktu-table">
          <div class="info-section-title">🕐 Jadual Waktu</div>
          <table class="waktu-tbl">
            <tbody>${rowsWaktu}</tbody>
          </table>
        </div>
        <div class="guru-hadir-list">
          <div class="info-section-title">✅ Guru Hadir (${guruHadir.length})</div>
          <table style="width:100%;border-collapse:collapse;font-size:11px">
            <tbody>${rowsHadir}</tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="info-footer">
      <span>SK King Edward VII (1) Taiping · Sistem Jadual Anjal</span>
      <span>Dicetak: ${tarikh}</span>
    </div>
  `;

  document.getElementById('area-cetak').innerHTML = html;
  document.getElementById('modal').classList.add('aktif');
}

// ── CETAK ──
function cetakInfografik() { window.print(); }

// ── TUTUP MODAL ──
function tutupModal(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('aktif');
  }
}

// ── INIT ──
setTarikh();
binaGrid();
</script>
</body>
</html>
